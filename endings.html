<style>
/* ─── ENDINGS GRID ─────────────────────────────────────────────── */
.endings-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
  margin-bottom:80px;
}

.ending-card{
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--bg-card);
  overflow:hidden;
  cursor:pointer;
  transition:border-color .4s,transform .4s,box-shadow .4s;
  position:relative;
  outline:none;
}

.ending-card:hover,
.ending-card:focus{
  border-color:var(--ending-color,var(--gold));
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.3);
}

.ending-card-accent{
  height:3px;
  background:var(--ending-color,var(--gold));
  width:100%;
}

.ending-card-body{
  padding:28px 32px 32px;
}

.ending-type{
  font-size:.6rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--ending-color,var(--gold));
  margin-bottom:10px;
}

.ending-name{
  font-family:var(--font-serif);
  font-size:1.35rem;
  letter-spacing:.04em;
  margin-bottom:12px;
  color:var(--white);
}

.ending-difficulty{
  font-size:.72rem;
  color:var(--gray);
  margin-bottom:14px;
  letter-spacing:.05em;
}

.ending-difficulty span{
  color:var(--white);
  font-weight:500;
}

.ending-desc{
  font-size:.84rem;
  color:var(--gray);
  line-height:1.65;
  margin-bottom:20px;
}

.ending-cta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:.68rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  font-weight:500;
  color:var(--ending-color,var(--gold));
  transition:gap .3s;
}

.ending-card:hover .ending-cta .arrow,
.ending-card:focus .ending-cta .arrow{
  transform:translateX(4px);
  display:inline-block;
  transition:transform .3s;
}

/* ─── OVERLAY ───────────────────────────────────────────────────── */
.ending-overlay{
  position:fixed;
  inset:0;
  z-index:2000;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s;
  overflow-y:auto;
}

.ending-overlay.active{
  opacity:1;
  pointer-events:all;
}

.ending-overlay-panel{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  max-width:720px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  padding:48px;
  position:relative;
  transform:translateY(20px) scale(.97);
  transition:transform .35s;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}

.ending-overlay.active .ending-overlay-panel{
  transform:translateY(0) scale(1);
}

.ending-overlay-close{
  position:absolute;
  top:20px;right:24px;
  background:none;
  border:1px solid var(--border);
  color:var(--gray);
  font-size:1.2rem;
  width:36px;height:36px;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:border-color .3s,color .3s;
}

.ending-overlay-close:hover{
  border-color:var(--white);
  color:var(--white);
}

.ending-overlay-header{
  padding-left:20px;
  margin-bottom:36px;
}

.ending-overlay-title{
  font-family:var(--font-serif);
  font-size:clamp(1.6rem,3vw,2.4rem);
  margin:8px 0 12px;
}

.ending-difficulty-full{
  font-size:.78rem;
  color:var(--gray);
  margin-bottom:16px;
}

.ending-difficulty-full span{color:var(--white);font-weight:500}

.ending-overlay-desc{
  font-size:.9rem;
  color:var(--gray);
  line-height:1.7;
  font-style:italic;
}

.ending-steps-section h3{
  font-size:.65rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:24px;
}

.ending-steps-list{
  list-style:none;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.ending-steps-list li{
  display:flex;
  align-items:flex-start;
  gap:16px;
}

.step-num{
  min-width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  font-weight:700;
  font-family:var(--font-serif);
  flex-shrink:0;
  margin-top:2px;
}

.step-text{
  font-size:.88rem;
  color:var(--gray);
  line-height:1.65;
}

/* ─── BUFF SEQUENCE (builds) ────────────────────────────────────── */
.buff-sequence-list{
  list-style:none;
  padding:0;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.buff-sequence-list li{
  display:flex;
  align-items:flex-start;
  gap:12px;
  font-size:.82rem;
  color:var(--gray);
}

.buff-step-num{
  min-width:22px;
  height:22px;
  border-radius:50%;
  background:var(--gold-dark);
  color:var(--white);
  font-size:.65rem;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}

@media(max-width:900px){
  .endings-grid{grid-template-columns:1fr}
  .ending-overlay-panel{padding:32px 24px}
}
@media(max-width:560px){
  .endings-grid{grid-template-columns:1fr}
}
</style>
</head>
